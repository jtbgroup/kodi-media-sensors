<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kodi Media Sensors WebSocket Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        h2 {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .section {
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        label {
            min-width: 120px;
            color: #333;
            font-size: 13px;
            font-weight: 500;
        }
        input[type="text"],
        input[type="password"],
        select {
            flex: 1;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            font-family: monospace;
        }
        input[type="text"]:focus,
        input[type="password"]:focus,
        select:focus {
            outline: none;
            border-color: #0066cc;
            box-shadow: 0 0 0 2px rgba(0, 102, 204, 0.1);
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #0066cc;
            color: white;
        }
        .btn-primary:hover {
            background: #0052a3;
        }
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .btn-danger {
            background: #cc0000;
            color: white;
        }
        .btn-danger:hover {
            background: #a30000;
        }
        .btn-danger:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #666;
            color: white;
        }
        .btn-secondary:hover {
            background: #555;
        }
        .btn-secondary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            padding: 8px 12px;
            border-radius: 4px;
            margin-top: 15px;
        }
        .status.connected {
            background: #e6f4ea;
            color: #137333;
        }
        .status.disconnected {
            background: #fce8e6;
            color: #c5221f;
        }
        .status.warning {
            background: #fef7e0;
            color: #b06000;
        }
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        .status.connected .status-dot {
            background: #30a14e;
        }
        .status.disconnected .status-dot {
            background: #d33b27;
            animation: none;
        }
        .status.warning .status-dot {
            background: #f9ab00;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .log-output {
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 4px;
            padding: 12px;
            font-family: "Courier New", monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #3e3e42;
        }
        .log-line {
            margin-bottom: 6px;
            line-height: 1.4;
            word-break: break-all;
        }
        .log-time {
            color: #858585;
        }
        .log-info {
            color: #4fc3f7;
        }
        .log-success {
            color: #4caf50;
        }
        .log-error {
            color: #f44336;
        }
        .log-warning {
            color: #ff9800;
        }
        .btn-clear {
            background: #666;
            color: white;
            padding: 6px 12px;
            font-size: 12px;
            margin-top: 10px;
        }
        .btn-clear:hover {
            background: #555;
        }
        .playlist, .search-results {
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 15px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        .result-item {
            padding: 8px;
            border-left: 3px solid #0066cc;
            background: white;
            margin-bottom: 8px;
            border-radius: 2px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .result-item:hover {
            background: #f0f0f0;
        }
        .result-item-title {
            font-weight: 500;
            color: #333;
        }
        .result-item-meta {
            color: #666;
            font-size: 12px;
            margin-top: 4px;
        }
        .empty {
            color: #999;
            font-style: italic;
            text-align: center;
            padding: 20px;
        }
        .category-group {
            margin-bottom: 12px;
        }
        .category-group h3 {
            font-size: 13px;
            color: #0066cc;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 4px;
        }
        .checkbox-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .checkbox-group label {
            min-width: auto;
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: normal;
            cursor: pointer;
        }
        .checkbox-group input[type="checkbox"] {
            flex: none;
            width: auto;
        }
        .btn-item-delete {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .btn-item-delete:hover {
            background: #ff5252;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Kodi Media Sensors WebSocket Test</h1>

        <div class="section">
            <h2>Home Assistant Configuration</h2>
            <div class="input-group">
                <label>Host:</label>
                <input type="text" id="haHost" placeholder="localhost" value="localhost">
            </div>
            <div class="input-group">
                <label>Port:</label>
                <input type="text" id="haPort" placeholder="8123" value="8123">
            </div>
            <div class="input-group">
                <label>Access Token:</label>
                <input type="password" id="haToken" placeholder="Paste your HA token">
            </div>
            <div class="input-group">
                <label>Entry ID:</label>
                <input type="text" id="entryId" placeholder="abc123def456" value="">
            </div>
            <div class="button-group">
                <button class="btn-primary" id="connectBtn" onclick="connect()">Connect</button>
                <button class="btn-danger" id="disconnectBtn" onclick="disconnect()" disabled>Disconnect</button>
            </div>
            <div class="status disconnected" id="status">
                <span class="status-dot"></span>
                <span id="statusText">Disconnected</span>
            </div>
        </div>

        <div class="section">
            <h2>Playlist Subscription</h2>
            <div class="button-group">
                <button class="btn-primary" id="subscribeBtn" onclick="subscribePlaylist()" disabled>Subscribe to playlist</button>
            </div>
        </div>

        <div class="playlist" id="playlistContainer" style="display: none;">
            <h2>Playlist</h2>
            <div id="playlistContent"></div>
        </div>

        <div class="section">
            <h2>Search</h2>
            <div class="input-group">
                <label>Query:</label>
                <input type="text" id="searchQuery" placeholder="e.g. batman">
            </div>
            <div class="checkbox-group" id="categoryCheckboxes">
                <label><input type="checkbox" value="movies" checked> Movies</label>
                <label><input type="checkbox" value="tvshows" checked> TV Shows</label>
                <label><input type="checkbox" value="songs" checked> Songs</label>
                <label><input type="checkbox" value="albums" checked> Albums</label>
                <label><input type="checkbox" value="artists" checked> Artists</label>
            </div>
            <div class="button-group">
                <button class="btn-primary" id="searchBtn" onclick="search()" disabled>Search</button>
                <button class="btn-secondary" onclick="toggleAllCategories(true)">Select all</button>
                <button class="btn-secondary" onclick="toggleAllCategories(false)">Select none</button>
            </div>
        </div>

        <div class="search-results" id="searchResultsContainer" style="display: none;">
            <h2>Search Results</h2>
            <div id="searchResultsContent"></div>
        </div>

        <div class="section">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>Logs</h2>
                <button class="btn-clear" onclick="clearLogs()">Clear</button>
            </div>
            <div class="log-output" id="log"></div>
        </div>
    </div>

    <script>
        let ws = null;
        let nextMsgId = 1;
        let playlistSubscriptionId = null;
        const log = document.getElementById('log');
        const logOutput = [];
        const ALL_CATEGORIES = ['movies', 'tvshows', 'songs', 'albums', 'artists'];

        function addLog(message, type = 'info') {
            const now = new Date().toLocaleTimeString();
            const logClass = `log-${type}`;
            const line = `<div class="log-line"><span class="log-time">[${now}]</span> <span class="${logClass}">${escapeHtml(message)}</span></div>`;
            logOutput.push(line);

            if (logOutput.length > 100) {
                logOutput.shift();
            }

            log.innerHTML = logOutput.join('');
            log.scrollTop = log.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function clearLogs() {
            logOutput.length = 0;
            log.innerHTML = '';
            addLog('Logs cleared', 'info');
        }

        function updateStatus(state) {
            const statusEl = document.getElementById('status');
            const statusText = document.getElementById('statusText');
            const connectBtn = document.getElementById('connectBtn');
            const disconnectBtn = document.getElementById('disconnectBtn');
            const subscribeBtn = document.getElementById('subscribeBtn');
            const searchBtn = document.getElementById('searchBtn');

            if (state === 'connected') {
                statusEl.className = 'status connected';
                statusText.textContent = 'Connected';
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
                subscribeBtn.disabled = false;
                searchBtn.disabled = false;
            } else {
                statusEl.className = 'status disconnected';
                statusText.textContent = 'Disconnected';
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
                subscribeBtn.disabled = true;
                searchBtn.disabled = true;
            }
        }

        function setKodiUnavailable(unavailable) {
            const statusEl = document.getElementById('status');
            const statusText = document.getElementById('statusText');

            if (unavailable) {
                statusEl.className = 'status warning';
                statusText.textContent = 'Connected — Kodi unavailable';
            } else {
                statusEl.className = 'status connected';
                statusText.textContent = 'Connected';
            }
        }

        function connect() {
            const host = document.getElementById('haHost').value;
            const port = document.getElementById('haPort').value;
            const token = document.getElementById('haToken').value;
            const entryId = document.getElementById('entryId').value;

            if (!host || !port || !token || !entryId) {
                addLog('❌ Please fill in all fields', 'error');
                return;
            }

            // Persist connection settings for next time
            try {
                localStorage.setItem('kodi_ws_test_settings', JSON.stringify({
                    haHost: host,
                    haPort: port,
                    haToken: token,
                    entryId: entryId
                }));
            } catch (err) {
                addLog('⚠️ Could not save settings to localStorage: ' + err, 'warning');
            }

            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const url = `${protocol}//${host}:${port}/api/websocket`;

            addLog(`📡 Connecting to ${url}...`, 'info');

            ws = new WebSocket(url);

            ws.onopen = () => {
                addLog('✓ WebSocket opened', 'success');

                const authMsg = {
                    type: 'auth',
                    access_token: token
                };
                addLog('→ Sending auth: ' + JSON.stringify(authMsg), 'info');
                ws.send(JSON.stringify(authMsg));
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                addLog('← Received: ' + JSON.stringify(msg), 'info');

                if (msg.type === 'auth_ok') {
                    addLog('✓ Authentication successful', 'success');
                    updateStatus('connected');
                }

                if (msg.type === 'auth_invalid') {
                    addLog('❌ Authentication failed', 'error');
                }

                if (msg.type === 'result') {
                    handleResult(msg);
                }

                if (msg.type === 'event') {
                    handleEvent(msg);
                }
            };

            ws.onerror = (error) => {
                addLog('❌ WebSocket error: ' + error, 'error');
                updateStatus('disconnected');
            };

            ws.onclose = () => {
                addLog('✗ Connection closed', 'warning');
                updateStatus('disconnected');
                playlistSubscriptionId = null;
            };
        }

        function disconnect() {
            if (ws) {
                ws.close();
                addLog('Disconnection requested', 'info');
                updateStatus('disconnected');
                playlistSubscriptionId = null;
            }
        }

        function handleResult(msg) {
            if (msg.id === playlistSubscriptionId) {
                if (msg.success) {
                    addLog('✓ Playlist subscription confirmed', 'success');
                } else {
                    addLog('❌ Playlist subscription error: ' + JSON.stringify(msg.error), 'error');
                    playlistSubscriptionId = null;
                }
                return;
            }

            if (msg.success) {
                addLog('✓ Search results received', 'success');
                if (msg.result && msg.result.results) {
                    displaySearchResults(msg.result.results);
                }
            } else {
                addLog('❌ Search error: ' + JSON.stringify(msg.error), 'error');
            }
        }

        function handleEvent(msg) {
            if (msg.id !== playlistSubscriptionId) {
                return;
            }

            const evt = msg.event;

            if (evt.type === 'playlist_update') {
                addLog('🎵 Playlist update received (state: ' + evt.kodi_state + ')', 'success');
                setKodiUnavailable(false);
                displayPlaylist(evt.items, evt.kodi_state);
            }

            if (evt.type === 'kodi_unavailable') {
                addLog('⚠️ Kodi reported as unavailable', 'warning');
                setKodiUnavailable(true);
                displayPlaylistUnavailable();
            }
        }

        function subscribePlaylist() {
            const entryId = document.getElementById('entryId').value;
            if (!entryId) {
                addLog('❌ Entry ID is required', 'error');
                return;
            }

            playlistSubscriptionId = nextMsgId++;
            const subMsg = {
                id: playlistSubscriptionId,
                type: 'kodi_media_sensors/playlist_subscribe',  // ✅ NOUVEAU NOM
                entry_id: entryId
            };
            addLog('→ Sending subscribe: ' + JSON.stringify(subMsg), 'info');
            ws.send(JSON.stringify(subMsg));
        }

        function toggleAllCategories(checked) {
            document.querySelectorAll('#categoryCheckboxes input[type="checkbox"]').forEach(cb => {
                cb.checked = checked;
            });
        }

        function search() {
            const entryId = document.getElementById('entryId').value;
            const query = document.getElementById('searchQuery').value.trim();

            if (!entryId) {
                addLog('❌ Entry ID is required', 'error');
                return;
            }
            if (!query) {
                addLog('❌ Search query is required', 'error');
                return;
            }

            const checked = Array.from(
                document.querySelectorAll('#categoryCheckboxes input[type="checkbox"]:checked')
            ).map(cb => cb.value);

            if (checked.length === 0) {
                addLog('❌ Select at least one category', 'error');
                return;
            }

            const categories = checked.length === ALL_CATEGORIES.length ? ['all'] : checked;

            categories.forEach(category => {
                const msgId = nextMsgId++;
                const searchMsg = {
                    id: msgId,
                    type: 'kodi_media_sensors/search',
                    entry_id: entryId,
                    query: query,
                    category: category
                };
                addLog('→ Sending search: ' + JSON.stringify(searchMsg), 'info');
                ws.send(JSON.stringify(searchMsg));
            });
        }

        function displayPlaylist(items, kodiState) {
            const container = document.getElementById('playlistContainer');
            const content = document.getElementById('playlistContent');
            const heading = container.querySelector('h2');
            heading.textContent = kodiState ? `Playlist (Kodi: ${kodiState})` : 'Playlist';

            if (items && items.length > 0) {
                let html = '';
                items.forEach((item, index) => {
                    html += `
                        <div class="result-item">
                            <div style="display: flex; justify-content: space-between; align-items: center; gap: 10px;">
                                <div style="flex: 1; cursor: pointer;" onclick="playItem(${index})">
                                    <div class="result-item-title">${index + 1}. ${item.title || item.label || 'Untitled'}</div>
                                    <div class="result-item-meta">
                                        ${item.artist ? `Artist: ${Array.isArray(item.artist) ? item.artist.join(', ') : item.artist} | ` : ''}
                                        Duration: ${formatDuration(item.duration || 0)}
                                    </div>
                                </div>
                                <button class="btn-item-delete" onclick="removeItem(${index})" title="Remove from playlist">🗑️</button>
                            </div>
                        </div>
                    `;
                });
                content.innerHTML = html;
            } else {
                content.innerHTML = '<div class="empty">Empty playlist</div>';
            }
            container.style.display = 'block';
        }

        function displayPlaylistUnavailable() {
            const container = document.getElementById('playlistContainer');
            const content = document.getElementById('playlistContent');
            content.innerHTML = '<div class="empty">⚠️ Kodi is currently unavailable</div>';
            container.style.display = 'block';
        }

        function playItem(index) {
            const entryId = document.getElementById('entryId').value;
            if (!entryId) {
                addLog('❌ Entry ID is required', 'error');
                return;
            }

            const msgId = nextMsgId++;
            const playMsg = {
                id: msgId,
                type: 'kodi_media_sensors/playlist_play_item',  // ✅ NOUVEAU ENDPOINT
                entry_id: entryId,
                index: index
            };
            addLog('→ Playing item at index ' + index + ': ' + JSON.stringify(playMsg), 'info');
            ws.send(JSON.stringify(playMsg));
        }

        function removeItem(index) {
            const entryId = document.getElementById('entryId').value;
            if (!entryId) {
                addLog('❌ Entry ID is required', 'error');
                return;
            }

            const msgId = nextMsgId++;
            const removeMsg = {
                id: msgId,
                type: 'kodi_media_sensors/playlist_remove_item',  // ✅ NOUVEAU ENDPOINT
                entry_id: entryId,
                index: index
            };
            addLog('→ Removing item at index ' + index + ': ' + JSON.stringify(removeMsg), 'info');
            ws.send(JSON.stringify(removeMsg));
        }

        function displaySearchResults(results) {
            const container = document.getElementById('searchResultsContainer');
            const content = document.getElementById('searchResultsContent');

            const labels = {
                movies: 'Movies',
                tvshows: 'TV Shows',
                songs: 'Songs',
                albums: 'Albums',
                artists: 'Artists'
            };

            let html = '';
            let hasAny = false;

            for (const [category, items] of Object.entries(results)) {
                if (!items || items.length === 0) continue;
                hasAny = true;
                html += `<div class="category-group"><h3>${labels[category] || category} (${items.length})</h3>`;
                items.forEach(item => {
                    html += renderSearchItem(category, item);
                });
                html += '</div>';
            }

            content.innerHTML = hasAny ? html : '<div class="empty">No results found</div>';
            container.style.display = 'block';
        }

        function renderSearchItem(category, item) {
            const title = item.title || item.label || item.artist || 'Untitled';
            let meta = '';

            switch (category) {
                case 'movies':
                case 'tvshows':
                    meta = [item.year, item.rating ? `★ ${item.rating}` : null].filter(Boolean).join(' | ');
                    break;
                case 'songs':
                    meta = [
                        item.artist ? (Array.isArray(item.artist) ? item.artist.join(', ') : item.artist) : null,
                        item.album,
                        item.duration ? formatDuration(item.duration) : null
                    ].filter(Boolean).join(' | ');
                    break;
                case 'albums':
                    meta = [
                        item.artist ? (Array.isArray(item.artist) ? item.artist.join(', ') : item.artist) : null,
                        item.year
                    ].filter(Boolean).join(' | ');
                    break;
                case 'artists':
                    meta = '';
                    break;
            }

            return `
                <div class="result-item">
                    <div class="result-item-title">${escapeHtml(String(title))}</div>
                    ${meta ? `<div class="result-item-meta">${escapeHtml(meta)}</div>` : ''}
                </div>
            `;
        }

        function formatDuration(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${String(secs).padStart(2, '0')}`;
        }

        function loadSavedSettings() {
            try {
                const saved = localStorage.getItem('kodi_ws_test_settings');
                if (!saved) return;
                const settings = JSON.parse(saved);
                if (settings.haHost) document.getElementById('haHost').value = settings.haHost;
                if (settings.haPort) document.getElementById('haPort').value = settings.haPort;
                if (settings.haToken) document.getElementById('haToken').value = settings.haToken;
                if (settings.entryId) document.getElementById('entryId').value = settings.entryId;
                addLog('Loaded saved connection settings', 'info');
            } catch (err) {
                addLog('⚠️ Could not load saved settings: ' + err, 'warning');
            }
        }

        addLog('Kodi Media Sensors WebSocket Test', 'info');
        addLog('Fill in the settings and click "Connect"', 'info');
        loadSavedSettings();
        updateStatus('disconnected');
    </script>
</body>
</html>
